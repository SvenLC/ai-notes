services:
  db:
    image: postgres:16
    container_name: open_case_memory_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-open_case_memory}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-open_case_memory}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: open_case_memory_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@db:5432/open_case_memory}
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: open_case_memory_web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${WEB_PORT:-3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      - api

  mcp:
    build:
      context: .
      dockerfile: ./apps/mcp/Dockerfile
    container_name: open_case_memory_mcp
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${MCP_PORT:-4100}
      API_BASE_URL: ${API_BASE_URL:-http://api:4000}
    ports:
      - "${MCP_PORT:-4100}:4100"
    depends_on:
      - api

volumes:
  db_data:
